apiVersion: apps/v1
kind: Deployment 
metadata:
  name: apache-deployment
  namespace: apache 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
  
  template:
    metadata:
      labels:
        app: apache
# Container images
    spec:
      containers:
      - name: apache
        image: httpd:latest
        ports: 
        - containerPort: 80
# Resources
        resources: 
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
 